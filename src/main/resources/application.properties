# ========================================
# Application Configuration
# ========================================
spring.application.name=E-Commerce Product Management

# ========================================
# Server Configuration
# ========================================
server.port=8090
server.servlet.context-path=/

# ========================================
# Database Configuration
# ========================================
# Using your existing database 'curdapp_db'
spring.datasource.url=jdbc:postgresql://localhost:5432/curdapp_db
spring.datasource.username=postgres
spring.datasource.password=Sql@054003
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=/tmp

# Image Storage Path (relative to project root)
app.image.upload-dir=uploads/images/

# ========================================
# Logging Configuration
# ========================================
logging.level.com.jakirbd.curdapp=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
