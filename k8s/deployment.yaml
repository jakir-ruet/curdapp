# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curdapp
  namespace: production
  labels:
    app: curdapp
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: curdapp
  template:
    metadata:
      labels:
        app: curdapp
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
      - name: curdapp
        image: ${DOCKER_REGISTRY}/curdapp:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
          name: http
        envFrom:
        - configMapRef:
            name: curdapp-config
        - secretRef:
            name: curdapp-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/curdappdb"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8090
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: curdapp-uploads-pvc
      - name: logs
        emptyDir: {}
      terminationGracePeriodSeconds: 60
